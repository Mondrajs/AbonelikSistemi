version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: sub_db
    restart: always
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: rootpassword
      POSTGRES_DB: subscription_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app-network

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: sub_backend
    restart: always
    command: npm run dev
    environment:
      - DATABASE_URL=postgresql://root:rootpassword@db:5432/subscription_db?schema=public
      - JWT_SECRET=super_secret_jwt_key_123
      - PORT=5000
    ports:
      - "5000:5000"
    depends_on:
      - db
    networks:
      - app-network
    volumes:
      - ./server:/app
      - /app/node_modules
      - /app/dist

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: sub_frontend
    restart: always
    command: npm run dev
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000/api
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - app-network
    volumes:
      - ./client:/app
      - /app/node_modules
      - /app/.next

networks:
  app-network:
    driver: bridge

volumes:
  pgdata:
